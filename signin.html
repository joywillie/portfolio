<div id="error-box" style="display:none; color: #ff4d4d; margin-bottom: 15px; text-align: center;"></div>

<form id="loginForm">
    <input type="email" name="email" placeholder="enter your email" required>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit" class="btn-submit">Sign In</button>
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault(); // This stops the page from redirecting
    
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    const response = await fetch('/api/auth/signin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    if (response.ok) {
        window.location.href = '/'; // Redirect only on success
    } else {
        const errorDiv = document.getElementById('error-box');
        errorDiv.innerText = "Invalid credentials. Please try again.";
        errorDiv.style.display = 'block';
    }
});
</script>
