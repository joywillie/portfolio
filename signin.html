<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .auth-card { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h2 { color: #38bdf8; margin-bottom: 20px; text-align: center; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
    button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 6px; color: #0f172a; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #0ea5e9; }
    p { margin-top: 15px; text-align: center; font-size: 14px; color: #cbd5e1; }
    a { color: #38bdf8; text-decoration: none; display: inline-block; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <form id="signin-form">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
    <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    <p><a href="/forgot-password">Forgot Password?</a></p>
  </div>

  <script>
    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/signin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if(res.ok) { 
        localStorage.setItem('token', data.token);
        alert("✨ Welcome back, " + data.user.name + "!");
        window.location.href = '/'; 
      } else { 
        alert("⚠️ " + data.error); 
      }
    });
  </script>
</body>
</html>
