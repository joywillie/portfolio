<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .auth-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 4px 25px rgba(0,0,0,0.4); text-align: center; }
    .auth-card h1 { font-size: 32px; font-weight: 700; color: #38bdf8; margin-bottom: 8px; }
    .auth-card p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
    form { display: flex; flex-direction: column; gap: 20px; }
    .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 14px 16px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; transition: border-color 0.3s; }
    .form-group input:focus { border-color: #38bdf8; }
    .action-btn { background: #38bdf8; color: #0f172a; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.3s; width: 100%; margin-top: 10px; }
    .action-btn:hover { background: #0ea5e9; }
    .auth-links { margin-top: 25px; font-size: 14px; color: #94a3b8; }
    .auth-links a { color: #38bdf8; text-decoration: none; font-weight: 500; }
    .auth-links a:hover { text-decoration: underline; }
    .status-msg { font-size: 14px; margin-bottom: 15px; display: none; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="auth-card">
    <h1>Welcome Back</h1>
    <p>Sign in to access JoyTech Portfolio platform</p>
    <div id="status-box" class="status-msg"></div>
    <form id="signin-form">
      <div class="form-group"><input type="email" id="email" placeholder="Email Address" required></div>
      <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
      <button type="submit" class="action-btn">Sign In</button>
    </form>
    <div class="auth-links">
      <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    </div>
  </main>
  <script>
    document.getElementById("signin-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const statusBox = document.getElementById("status-box");
      
      try {
        const response = await fetch('/api/auth/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (data.success) {
          statusBox.style.background = "rgba(34, 197, 94, 0.1)";
          statusBox.style.color = "#22c55e";
          statusBox.textContent = "Success! Entering portfolio...";
          statusBox.style.display = "block";
          window.location.href = "/";
        } else {
          statusBox.style.background = "rgba(239, 68, 68, 0.1)";
          statusBox.style.color = "#ef4444";
          statusBox.textContent = data.message;
          statusBox.style.display = "block";
        }
      } catch (err) {
        statusBox.textContent = "Connection error to authentication gateway.";
        statusBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
