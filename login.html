<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #0f172a;
    }
    .login-card {
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #334155;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    .login-card h2 {
      color: #38bdf8;
      font-size: 28px;
      margin-bottom: 25px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: white;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: #38bdf8;
      outline: none;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.3s;
    }
    .login-btn:hover {
      background: #0ea5e9;
    }
    .error-msg {
      color: #f43f5e;
      font-size: 14px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <section class="login-section">
    <div class="login-card">
      <h2>Admin Portal</h2>
      <div class="error-msg" id="error-box">Invalid credentials</div>
      <form action="/login" method="POST" id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-btn">Access Dashboard</button>
      </form>
    </div>
  </section>

  <script>
    // Detect clear auth failures passed via URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === '1') {
      document.getElementById('error-box').style.display = 'block';
    }
  </script>
</body>
</html>
