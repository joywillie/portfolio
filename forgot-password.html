<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .auth-card { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h2 { color: #38bdf8; margin-bottom: 15px; text-align: center; }
    p.info { font-size: 13px; color: #cbd5e1; text-align: center; margin-bottom: 20px; line-height: 1.5; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; }
    button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 6px; color: #0f172a; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #0ea5e9; }
    .back { margin-top: 15px; text-align: center; font-size: 14px; }
    a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p class="info">Enter your registered email. The backend system will generate an encryption key string token safely visible inside your console dashboard.</p>
    <form id="forgot-form">
      <input type="email" id="email" placeholder="Enter your email" required>
      <button type="submit">Generate Reset PIN</button>
    </form>
    <div class="back"><a href="/signin">← Back to Sign In</a></div>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value })
      });
      const data = await res.json();
      if(res.ok) { 
        alert("🔑 Token PIN processed successfully! Go check your Render Dashboard Web Service logs right now to grab your secure 6-digit access PIN."); 
      } else { 
        alert("⚠️ " + data.error); 
      }
    });
  </script>
</body>
</html>
