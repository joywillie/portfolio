<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-section {
      padding: 100px 8% 40px;
      min-height: 100vh;
      background: #0f172a;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid #334155;
      padding-bottom: 20px;
    }
    .admin-header h1 { color: #38bdf8; font-size: 32px; }
    .logout-btn {
      background: #f43f5e;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: background 0.3s;
    }
    .logout-btn:hover { background: #e11d48; }
    
    .msg-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .msg-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 25px;
      border-radius: 10px;
    }
    .msg-meta {
      display: flex;
      justify-content: space-between;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .msg-sender { font-weight: 600; color: #38bdf8; }
    .msg-body {
      color: #cbd5e1;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 60px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <section class="admin-section">
    <div class="admin-header">
      <h1>Contact Submissions</h1>
      <a href="/logout" class="logout-btn">Secure Logout</a>
    </div>

    <div class="msg-grid" id="messages-wrapper">
      <div class="empty-state">Loading message matrix logs...</div>
    </div>
  </section>

  <script>
    // Dynamically retrieve database records asynchronously
    async function loadMessages() {
      try {
        const response = await fetch('/api/messages');
        if (response.status === 401) {
          window.location.href = '/login.html';
          return;
        }
        
        const data = await response.json();
        const wrapper = document.getElementById('messages-wrapper');
        
        if (data.length === 0) {
          wrapper.innerHTML = '<div class="empty-state">No messages saved to the database database yet.</div>';
          return;
        }
        
        wrapper.innerHTML = data.map(msg => `
          <div class="msg-card">
            <div class="msg-meta">
              <div>From: <span class="msg-sender">${escapeHtml(msg.name)}</span> (<a href="mailto:${escapeHtml(msg.email)}" style="color:#64748b;">${escapeHtml(msg.email)}</a>)</div>
              <div>${new Date(msg.created_at).toLocaleString()}</div>
            </div>
            <div class="msg-body">${escapeHtml(msg.message)}</div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('messages-wrapper').innerHTML = '<div class="empty-state" style="color:#f43f5e;">Failed to stream data.</div>';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    window.onload = loadMessages;
  </script>
</body>
</html>
