<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Portfolio - About Me</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0f172a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 8%; border-bottom: 1px solid #1e293b; background: #0f172a; }
        nav .brand { font-size: 22px; font-weight: bold; color: #38bdf8; text-decoration: none; }
        nav .links { display: flex; gap: 24px; }
        nav .links a { color: #94a3b8; text-decoration: none; font-size: 16px; font-weight: 500; }
        nav .links a:hover, nav .links a.active { color: #38bdf8; }
        .container { max-width: 900px; margin: 60px auto; padding: 0 20px; width: 100%; }
        h1 { font-size: 36px; margin-bottom: 20px; color: #ffffff; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .bio-text { font-size: 18px; color: #cbd5e1; line-height: 1.8; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        .infused-card { background: #1e293b; border: 1px solid #334155; padding: 30px; border-radius: 12px; margin-top: 30px; }
        .infused-card h2 { color: #38bdf8; font-size: 24px; margin-bottom: 14px; }
        .infused-card p { color: #cbd5e1; font-size: 16px; line-height: 1.7; white-space: pre-wrap; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="brand">JoyTech</a>
        <div class="links">
            <a href="/">Home</a>
            <a href="/about" class="active">About</a>
            <a href="/skills">Skills</a>
            <a href="/projects">Projects</a>
            <a href="/contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Professional Biography</h1>
        <p class="bio-text" id="about-bio-render">Loading biography matrix statement...</p>
        
        <div id="infinite-custom-sections"></div>
    </div>

    <script>
        fetch('/api/public/site-data')
            .then(res => res.json())
            .then(data => {
                if(data.fixedText.about_bio) document.getElementById('about-bio-render').innerText = data.fixedText.about_bio;

                const customContainer = document.getElementById('infinite-custom-sections');
                const aboutBlocks = data.customSections.filter(sec => sec.page_target === 'about');
                customContainer.innerHTML = aboutBlocks.map(sec => `
                    <div class="infused-card">
                        <h2>${sec.section_title}</h2>
                        <p>${sec.section_content}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
