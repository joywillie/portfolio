<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoyTech Portfolio - Competencies</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0f172a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 8%; border-bottom: 1px solid #1e293b; background: #0f172a; }
        nav .brand { font-size: 22px; font-weight: bold; color: #38bdf8; text-decoration: none; }
        nav .links { display: flex; gap: 24px; }
        nav .links a { color: #94a3b8; text-decoration: none; font-size: 16px; }
        nav .links a:hover, nav .links a.active { color: #38bdf8; }
        .container { max-width: 1000px; margin: 60px auto; padding: 0 20px; width: 100%; }
        h1 { font-size: 36px; margin-bottom: 30px; color: #ffffff; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 40px; }
        .skill-pill { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: 600; color: #38bdf8; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .infused-card { background: #1e293b; border: 1px solid #334155; padding: 30px; border-radius: 12px; margin-top: 30px; }
        .infused-card h2 { color: #c084fc; font-size: 24px; margin-bottom: 14px; }
        .infused-card p { color: #cbd5e1; font-size: 16px; line-height: 1.7; white-space: pre-wrap; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="brand">JoyTech</a>
        <div class="links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/skills" class="active">Skills</a>
            <a href="/projects">Projects</a>
            <a href="/contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Core Skill Competencies</h1>
        <div class="skills-grid" id="skills-render-box"></div>
        
        <div id="infinite-custom-sections"></div>
    </div>

    <script>
        fetch('/api/public/site-data')
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('skills-render-box');
                if(data.skills.length === 0) {
                    box.innerHTML = `<p style="color:#94a3b8;">No technical skill entities saved yet.</p>`;
                } else {
                    box.innerHTML = data.skills.map(s => `<div class="skill-pill">${s.name}</div>`).join('');
                }

                const customContainer = document.getElementById('infinite-custom-sections');
                const skillBlocks = data.customSections.filter(sec => sec.page_target === 'skills');
                customContainer.innerHTML = skillBlocks.map(sec => `
                    <div class="infused-card">
                        <h2>${sec.section_title}</h2>
                        <p>${sec.section_content}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
