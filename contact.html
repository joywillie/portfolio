<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - JoyTech</title>
    <style>
        /* 🎨 Core Theme Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 🌐 Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid #1e293b;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
            text-decoration: none;
        }
        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 25px;
            font-size: 16px;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active {
            color: #38bdf8;
        }

        /* 📨 Main Layout Structure */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            width: 100%;
        }
        .page-title {
            text-align: center;
            font-size: 36px;
            color: #38bdf8;
            margin-bottom: 40px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* 📞 Left Column Info Blocks */
        .info-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .info-card h3 {
            font-size: 24px;
            color: #38bdf8;
            margin-bottom: 15px;
        }
        .info-card p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .channel-link {
            display: flex;
            align-items: center;
            background-color: #0f172a;
            padding: 16px;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 16px;
            border: 1px solid #334155;
            font-weight: 500;
            transition: border-color 0.2s;
        }
        .channel-link:hover {
            border-color: #38bdf8;
        }
        .channel-link span {
            margin-right: 10px;
        }

        /* 📝 Right Column Form Layout */
        .form-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #38bdf8;
        }
        .form-group textarea {
            height: 150px;
            resize: none;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #0ea5e9;
        }
        .btn-submit:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Responsive Breakpoint */
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">JoyTech</a>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/skills">Skills</a>
            <a href="/projects">Projects</a>
            <a href="/contact" class="active">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h2 class="page-title">Contact Me</h2>
        
        <div class="contact-grid">
            <div class="info-card">
                <h3>Get in Touch Instantly</h3>
                <p>Feel free to reach out via any of these channels for freelance inquiries, collaboration projects, or technical consultations.</p>
                
                <a href="https://wa.me/254745806435" target="_blank" class="channel-link">
                    <span>💬</span> Chat on WhatsApp
                </a>
                <a href="tel:0745806435" class="channel-link">
                    <span>📞</span> Call Me: 0745806435
                </a>
                <a href="mailto:jw42205769@gmail.com" class="channel-link">
                    <span>✉️</span> Email: jw42205769@gmail.com
                </a>
            </div>

            <div class="form-card">
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Name e.g antonia" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="Your Email e.g antoniawilliz@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Services you need e.g web development" required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.querySelector('.btn-submit');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;

            const formData = {
                name: e.target.name.value,
                email: e.target.email.value,
                message: e.target.message.value
            };

            try {
                const response = await fetch('/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showNotification("✨ Message sent successfully! Thank you for reaching out, I will get back to you shortly.", "success");
                    e.target.reset();
                } else {
                    showNotification("❌ Oops! There was a problem processing your form submission. Please try again.", "error");
                }
            } catch (error) {
                showNotification("❌ Connection error. Unable to reach gateway server.", "error");
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        // 🌟 Modern Notification UI Display Function
        function showNotification(message, type) {
            const oldAlert = document.getElementById('custom-toast');
            if (oldAlert) oldAlert.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.innerText = message;
            
            // Layout styling configuration matrix
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.right = '30px';
            toast.style.padding = '16px 24px';
            toast.style.borderRadius = '8px';
            toast.style.color = '#ffffff';
            toast.style.fontWeight = '600';
            toast.style.boxShadow = '0 10px 25px rgba(0, 0, 0, 0.4)';
            toast.style.zIndex = '10000';
            toast.style.transition = 'all 0.3s ease';
            toast.style.fontFamily = 'sans-serif';
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444'; // Emerald green vs Ruby red

            document.body.appendChild(toast);

            // Automated slide-out animation sequence
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 4500);
        }
    </script>
</body>
</html>
