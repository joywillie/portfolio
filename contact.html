<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me - JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    
    header { background: #0f172a; padding: 20px 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
    .logo a { color: #38bdf8; font-size: 26px; font-weight: 700; text-decoration: none; }
    
    nav { display: flex; align-items: center; gap: 30px; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: 16px; font-weight: 500; transition: color 0.3s ease; }
    nav a:hover { color: #38bdf8; }

    .contact-container { max-width: 800px; margin: auto; padding: 60px 40px; width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
    .contact-heading { text-align: center; margin-bottom: 40px; }
    .contact-heading h1 { font-size: 42px; font-weight: 700; margin-bottom: 10px; }
    .contact-heading p { color: #94a3b8; font-size: 16px; }

    .contact-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    
    form { display: flex; flex-direction: column; gap: 20px; }
    .form-row { display: flex; gap: 20px; }
    .form-group { flex: 1; display: flex; flex-direction: column; }
    
    .form-group input, .form-group textarea { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 14px 16px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; transition: border-color 0.3s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #38bdf8; }
    .form-group textarea { resize: none; min-height: 150px; }
    
    .submit-btn { background: #38bdf8; color: #0f172a; border: none; padding: 14px 28px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.3s; align-self: flex-start; }
    .submit-btn:hover { background: #0ea5e9; }

    @media (max-width: 768px) {
      header { padding: 20px 40px; }
      .form-row { flex-direction: column; gap: 20px; }
      .submit-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><a href="/">JoyTech</a></div>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/skills">Skills</a>
      <a href="/projects">Projects</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <main class="contact-container">
    <div class="contact-heading">
      <h1>Get In Touch</h1>
      <p>Have a question or want to work together? Leave a message down below!</p>
    </div>

    <div class="contact-card">
      <form action="https://formspree.io/f/xjgledbb" method="POST">
        <div class="form-row">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="Your Email Address" required>
          </div>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="Type your message here..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>
    </div>
  </main>

</body>
</html>
