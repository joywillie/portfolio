<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "/signin";
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | JoyTech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    
    header { background: #0f172a; padding: 20px 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
    .logo a { color: #38bdf8; font-size: 26px; font-weight: 700; text-decoration: none; }
    nav { display: flex; align-items: center; gap: 30px; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: 16px; font-weight: 500; transition: 0.3s; }
    nav a:hover { color: #38bdf8; }

    .content-container { max-width: 600px; margin: auto; padding: 60px 20px; flex-grow: 1; width: 100%; }
    h1 { font-size: 42px; font-weight: 700; margin-bottom: 15px; color: #38bdf8; text-align: center; }
    p.subtitle { color: #94a3b8; text-align: center; margin-bottom: 35px; font-size: 16px; }
    
    form { background: #1e293b; padding: 35px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { color: #cbd5e1; font-size: 14px; font-weight: 500; }
    .form-group input, .form-group textarea { background: #0f172a; border: 1px solid #334155; padding: 12px 16px; border-radius: 6px; color: #ffffff; font-size: 15px; outline: none; transition: 0.3s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.2); }
    
    .submit-btn { background: #38bdf8; color: #0f172a; border: none; padding: 14px; border-radius: 6px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .submit-btn:hover { background: #0ea5e9; }
    
    @media (max-width: 768px) { header { padding: 20px 40px; } }
  </style>
</head>
<body>

  <header>
    <div class="logo"><a href="/">JoyTech</a></div>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/skills">Skills</a>
      <a href="/projects">Projects</a>
      <a href="/contact" style="color: #38bdf8;">Contact</a>
      <div id="dynamic-auth-root" style="display: inline-block;"></div>
    </nav>
  </header>

  <main class="content-container">
    <h1>Get in Touch</h1>
    <p class="subtitle">Have a project or opportunity? Let's connect.</p>
    
    <form id="contact-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="your.email@example.com">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="5" required placeholder="Write your message here..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const authRoot = document.getElementById("dynamic-auth-root");
      const sessionToken = localStorage.getItem("token");
      if (sessionToken) {
        authRoot.innerHTML = `<a href="#" id="logout-trigger-btn" style="background: #ef4444; color: white; padding: 8px 18px; border-radius: 6px; font-weight: 600; text-decoration: none; font-size: 15px;">Sign Out</a>`;
        document.getElementById("logout-trigger-btn").addEventListener("click", (e) => {
          e.preventDefault(); localStorage.removeItem("token"); alert("👋 Signed out safely!"); window.location.href = "/signin";
        });
      } else {
        authRoot.innerHTML = `<a href="/signin" style="background: #38bdf8; color: #0f172a; padding: 8px 18px; border-radius: 6px; font-weight: 600; text-decoration: none; font-size: 15px;">Sign In</a>`;
      }

      // Optional contact submission handling can be wired here
      document.getElementById("contact-form").addEventListener("submit", (e) => {
        e.preventDefault();
        alert("✉️ Message placeholder captured successfully!");
      });
    });
  </script>
</body>
</html>
