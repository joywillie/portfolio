<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* GLOBAL RESET & BASE STYLES */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: #0f172a; color: white; padding-top: 90px; overflow-x: hidden; }
    
    /* Prevents background scrolling when mobile menu drawer is open */
    body.menu-locked { overflow: hidden; }

    /* NAVBAR STYLING */
    header { 
      width: 100%; display: flex; justify-content: space-between; align-items: center; 
      padding: 20px 8%; background: #111827; position: fixed; top: 0; left: 0; z-index: 1000; border-bottom: 1px solid #1e293b;
    }
    .logo { font-size: 28px; font-weight: 700; color: #38bdf8; text-decoration: none; position: relative; z-index: 1002; }
    
    /* DESKTOP NAVIGATION MENU */
    nav { display: flex; align-items: center; }
    nav a { color: white; text-decoration: none; margin-left: 30px; transition: 0.3s ease; font-weight: 500; font-size: 16px; }
    nav a:hover, nav a.active-link { color: #38bdf8; }

    /* 🍔 PROFESSIONAL ANIMATED HAMBURGER BUTTON */
    .hamburger { 
      display: none; flex-direction: column; justify-content: space-between;
      width: 28px; height: 20px; background: transparent; border: none; 
      cursor: pointer; padding: 0; z-index: 1002;
    }
    .hamburger span { 
      display: block; width: 100%; height: 3px; 
      background-color: #38bdf8; border-radius: 4px; 
      transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1); transform-origin: center;
    }

    /* Morph transitions into a clean "X" when active */
    .hamburger.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-10px); }
    .hamburger.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

    /* HERO PROFILE SECTION */
    .hero { min-height: 80vh; display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; gap: 50px; }
    .hero-text { flex: 1; }
    .hero-text h3 { color: #38bdf8; font-size: 18px; font-weight: 500; margin-bottom: 5px; }
    .hero-text h1 { font-size: 60px; font-weight: 700; color: #38bdf8; line-height: 1.2; }
    .hero-text h2 { font-size: 30px; font-weight: 600; margin: 15px 0; color: white; }
    .hero-text p { margin: 20px 0 35px 0; line-height: 1.8; max-width: 600px; color: #cbd5e1; font-size: 16px; }
    .buttons { display: flex; gap: 20px; }
    .btn { background: #38bdf8; color: #0f172a; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s ease; }
    .btn:hover { background: #0ea5e9; }
    .btn-outline { border: 2px solid #38bdf8; color: #38bdf8; padding: 12px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; transition: 0.3s ease; }
    .btn-outline:hover { background: rgba(56, 189, 248, 0.1); }
    .hero-image img { width: 340px; height: 340px; object-fit: cover; border-radius: 50%; border: 4px solid #38bdf8; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }

    footer { text-align: center; padding: 30px; background: #111827; color: #cbd5e1; margin-top: 40px; border-top: 1px solid #1e293b; }

    /* 📱 RESPONSIVE BREAKPOINT (Triggering at 1024px for easier testing) */
    @media (max-width: 1024px) {
      body { padding-top: 80px; }
      .hamburger { display: flex; }
      
      /* Slide-In Side Panel Menu */
      nav { 
        position: fixed; top: 0; right: -100%; width: 70%; max-width: 300px; height: 100vh; 
        background: #111827; flex-direction: column; justify-content: center; align-items: center; 
        gap: 35px; border-left: 1px solid #1e293b;
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1001;
      }
      
      nav.active { right: 0; }
      nav a { margin-left: 0; font-size: 20px; font-weight: 600; width: 100%; text-align: center; display: block; }
      
      /* Main content layout adjustment */
      .hero { flex-direction: column-reverse; text-align: center; padding: 20px 5%; gap: 35px; }
      .hero-text h1 { font-size: 42px; }
      .hero-image img { width: 260px; height: 260px; }
      .buttons { justify-content: center; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">JoyTech</a>
    
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="nav-menu">
      <a href="/" class="active-link">Home</a>
      <a href="/about.html">About</a>
      <a href="/skills.html">Skills</a>
      <a href="/projects.html">Projects</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h3>Hello, I'm</h3>
      <h1>Joyce William</h1>
      <h2>ICT Technician & Web Developer</h2>
      <p>Passionate about web development, UI design, mobile applications, and creating beautiful modern digital experiences.</p>
      <div class="buttons">
        <a href="/projects.html" class="btn">View Projects</a>
        <a href="/contact.html" class="btn-outline">Contact Me</a>
      </div>
    </div>
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop" alt="Joyce William Profile">
    </div>
  </section>

  <footer>
    <p>© 2026 JoyTech Portfolio | Designed by Joyce William</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const hamburger = document.getElementById('hamburger-btn');
      const menu = document.getElementById('nav-menu');
      const body = document.body;

      function toggleMenu() {
        const isOpen = hamburger.classList.toggle('active');
        menu.classList.toggle('active');
        body.classList.toggle('menu-locked');
        hamburger.setAttribute('aria-expanded', isOpen);
      }

      if (hamburger && menu) {
        hamburger.addEventListener('click', function(e) {
          e.stopPropagation();
          toggleMenu();
        });

        // Close menu immediately if a navigation link is clicked
        const navLinks = menu.querySelectorAll('a');
        navLinks.forEach(link => {
          link.addEventListener('click', () => {
            hamburger.classList.remove('active');
            menu.classList.remove('active');
            body.classList.remove('menu-locked');
            hamburger.setAttribute('aria-expanded', 'false');
          });
        });

        // Close menu automatically if user clicks anywhere outside the sidebar
        document.addEventListener('click', function(e) {
          if (menu.classList.contains('active') && !menu.contains(e.target) && !hamburger.contains(e.target)) {
            hamburger.classList.remove('active');
            menu.classList.remove('active');
            body.classList.remove('menu-locked');
            hamburger.setAttribute('aria-expanded', 'false');
          }
        });
      }
    });
  </script>
</body>
</html>
