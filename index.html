<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* GLOBAL STYLES */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html { scroll-behavior: smooth; }
    body { background: #0f172a; color: white; padding-top: 80px; }

    /* NAVBAR */
    header { 
      width: 100%; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 20px 8%; 
      background: #111827; 
      position: fixed; 
      top: 0; 
      left: 0;
      z-index: 1000; 
    }
    .logo { font-size: 28px; font-weight: 700; color: #38bdf8; text-decoration: none; }
    
    /* DESKTOP NAVIGATION */
    nav { display: flex; align-items: center; }
    nav a { color: white; text-decoration: none; margin-left: 25px; transition: 0.3s; font-weight: 500; }
    nav a:hover, nav a.active-link { color: #38bdf8; }

    /* HAMBURGER ICON (THE THREE LINES) */
    .hamburger { 
      display: none; /* Hidden on desktop screens */
      flex-direction: column; 
      cursor: pointer; 
      gap: 6px; 
      z-index: 1002; 
      padding: 5px;
    }
    .hamburger span { 
      display: block; 
      width: 30px; 
      height: 3px; 
      background-color: #38bdf8; 
      border-radius: 2px; 
      transition: 0.3s; 
    }

    /* HERO SECTION */
    .hero { min-height: 80vh; display: flex; justify-content: space-between; align-items: center; padding: 40px 8%; gap: 40px; }
    .hero-text { flex: 1; }
    .hero-text h3 { font-size: 25px; margin-bottom: 10px; }
    .hero-text h1 { font-size: 65px; color: #38bdf8; }
    .hero-text h2 { font-size: 32px; margin: 10px 0; }
    .hero-text p { margin: 20px 0; line-height: 1.8; max-width: 600px; color: #cbd5e1; }
    .buttons { margin-top: 30px; }
    .btn { background: #38bdf8; color: black; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; margin-right: 15px; transition: 0.3s; display: inline-block; }
    .btn:hover { background: white; }
    .btn-outline { border: 2px solid #38bdf8; color: #38bdf8; padding: 12px 28px; text-decoration: none; border-radius: 8px; transition: 0.3s; display: inline-block; }
    .btn-outline:hover { background: #38bdf8; color: black; }
    .hero-image img { width: 350px; border-radius: 20px; box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); }

    footer { text-align: center; padding: 30px; background: #111827; color: #cbd5e1; margin-top: 40px; }

    /* MOBILE RESPONSIVE STYLES (UNDER 900PX WIDE) */
    @media (max-width: 900px) {
      body { padding-top: 100px; }
      
      /* Show the hamburger lines */
      .hamburger { 
        display: flex !important; 
      }
      
      /* Transform nav links into a clean mobile dropdown drawer menu */
      nav { 
        display: none; 
        flex-direction: column; 
        position: absolute; 
        top: 100%; 
        left: 0; 
        width: 100%; 
        background: #111827; 
        padding: 20px 0; 
        text-align: center; 
        border-top: 1px solid #1e293b; 
        box-shadow: 0 10px 15px rgba(0,0,0,0.5);
      }
      
      /* The .active class that JavaScript will add when you click the hamburger */
      nav.active { 
        display: flex !important; 
      }
      
      nav a { 
        margin: 15px 0; 
        font-size: 22px; 
        display: block; 
        width: 100%;
      }
      
      .hero { flex-direction: column; text-align: center; padding-top: 40px; }
      .hero-text h1 { font-size: 45px; }
      .hero-text h2 { font-size: 25px; }
      .hero-image img { width: 280px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">JoyTech</a>
    
    <div class="hamburger" id="hamburger-btn">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav id="nav-menu">
      <a href="/" class="active-link">Home</a>
      <a href="/about.html">About</a>
      <a href="/skills.html">Skills</a>
      <a href="/projects.html">Projects</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h3>Hello, I'm</h3>
      <h1>Joyce William</h1>
      <h2>ICT Technician & Web Developer</h2>
      <p>Passionate about web development, UI design, mobile applications, and creating beautiful modern digital experiences.</p>
      <div class="buttons">
        <a href="/projects.html" class="btn">View Projects</a>
        <a href="/contact.html" class="btn-outline">Contact Me</a>
      </div>
    </div>
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600&auto=format&fit=crop" alt="Profile Picture">
    </div>
  </section>

  <footer><p>© 2026 JoyTech Portfolio | Designed by Joyce William</p></footer>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const hamburgerButton = document.getElementById('hamburger-btn');
      const navigationMenu = document.getElementById('nav-menu');

      if (hamburgerButton && navigationMenu) {
        hamburgerButton.addEventListener('click', function(e) {
          e.stopPropagation(); // Prevents the click from instantly closing
          navigationMenu.classList.toggle('active'); // Toggles open/close visibility
        });
      }
    });
  </script>
</body>
</html>
