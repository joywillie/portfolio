<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio - Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0f172a;
      color: white;
      padding-top: 90px;
      overflow-x: hidden;
    }

    body.menu-locked {
      overflow: hidden;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: #111827;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #38bdf8;
      text-decoration: none;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 30px;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    nav a.active-link {
      color: #38bdf8;
    }

    /* HAMBURGER REPAIRED */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between; /* Fixes "X" alignment on transform */
      width: 28px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1002;
      padding: 0;
    }

    /* SPANS REPAIRED (Now visible) */
    .hamburger span {
      display: block;
      width: 100%;
      height: 3px;
      background: #38bdf8;
      border-radius: 5px;
      transition: 0.3s;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
    }

    .hero {
      min-height: 80vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 8%;
      gap: 50px;
    }

    .hero-text h3 {
      color: #38bdf8;
      font-size: 18px;
    }

    .hero-text h1 {
      font-size: 60px;
      color: #38bdf8;
    }

    .hero-text h2 {
      font-size: 30px;
      margin: 10px 0;
    }

    .hero-text p {
      color: #cbd5e1;
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      gap: 15px;
    }

    .btn {
      background: #38bdf8;
      color: #0f172a;
      padding: 12px 22px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .btn-outline {
      border: 2px solid #38bdf8;
      color: #38bdf8;
      padding: 12px 22px;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn-outline:hover {
      background: rgba(56, 189, 248, 0.1);
    }

    .hero-image img {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 4px solid #38bdf8;
      object-fit: cover;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
      transition: 0.4s ease;
    }

    .hero-image img:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #111827;
      border-top: 1px solid #1e293b;
      margin-top: 40px;
    }

    /* RESPONSIVE RESPONSIVENESS REPAIRED */
    @media (max-width: 1024px) {
      .hamburger {
        display: flex;
      }

      nav {
        position: fixed;
        top: 0;
        right: -100%;
        width: 70%;
        height: 100vh;
        background: #111827;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
        transition: 0.4s;
        border-left: 1px solid #1e293b;
      }

      nav.active {
        right: 0;
      }

      /* Fix alignment on mobile menu links */
      nav a {
        margin-left: 0;
        font-size: 20px;
        width: 100%;
        text-align: center;
      }

      .hero {
        flex-direction: column-reverse;
        text-align: center;
        padding-top: 20px;
      }

      .hero-text h1 {
        font-size: 42px;
      }

      .hero-image img {
        width: 250px;
        height: 250px;
      }

      .buttons {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

<header>
  <a href="/" class="logo">JoyTech</a>

  <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="nav">
    <a href="/" class="active-link">Home</a>
    <a href="/about.html">About</a>
    <a href="/skills.html">Skills</a>
    <a href="/projects.html">Projects</a>
    <a href="/contact.html">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-text">
    <h3>Hello, I'm</h3>
    <h1>Joyce William</h1>
    <h2>ICT Technician & Web Developer</h2>

    <p>
      Passionate about web development, UI design, mobile applications,
      and building modern digital experiences.
    </p>

    <div class="buttons">
      <a href="/projects.html" class="btn">View Projects</a>
      <a href="/contact.html" class="btn-outline">Contact Me</a>
    </div>
  </div>

 <div class="profile-container">
    <img src="images/image1.jpg">
</div>
</section>

<footer>
  <p>© 2026 JoyTech Portfolio | Designed by Joyce William</p>
</footer>

<script>
  const hamburger = document.getElementById("hamburger");
  const nav = document.getElementById("nav");
  const body = document.body;

  hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("active");
    nav.classList.toggle("active");
    body.classList.toggle("menu-locked");
  });

  document.querySelectorAll("nav a").forEach(link => {
    link.addEventListener("click", () => {
      hamburger.classList.remove("active");
      nav.classList.remove("active");
      body.classList.remove("menu-locked");
    });
  });
</script>

</body>
</html>
