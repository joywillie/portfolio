<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: #0f172a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    header { background: #0f172a; padding: 20px 80px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; z-index: 1000; }
    .logo a { color: #38bdf8; font-size: 26px; font-weight: 700; text-decoration: none; }
    nav { display: flex; align-items: center; gap: 30px; }
    nav a { color: #cbd5e1; text-decoration: none; font-size: 16px; font-weight: 500; transition: color 0.3s ease; }
    nav a:hover, nav a.active { color: #38bdf8; }
    .hero-container { max-width: 1200px; margin: auto; padding: 40px 80px; display: flex; justify-content: space-between; align-items: center; gap: 50px; flex-grow: 1; }
    .hero-text { flex: 1; max-width: 600px; }
    .hero-text h1 { font-size: 56px; font-weight: 700; margin-bottom: 15px; }
    .profile-glow-ring { width: 350px; height: 350px; border-radius: 50%; border: 3px solid #38bdf8; box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); overflow: hidden; }
    .profile-glow-ring img { width: 100%; height: 100%; object-fit: cover; }
    .upload-box { margin-top: 20px; text-align: center; }
    .btn-upload { cursor: pointer; padding: 8px 16px; background: #38bdf8; border: none; border-radius: 4px; color: #0f172a; font-weight: bold; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="/">JoyTech</a></div>
    <nav id="nav-menu">
      <a href="/" class="active">Home</a>
      <a href="/about">About</a>
      <a href="/skills">Skills</a>
      <a href="/projects">Projects</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>
  <main class="hero-container">
    <div class="hero-text">
      <h1 id="hero-title">Joyce William</h1>
      <p id="hero-description">ICT Technician & Web Developer.</p>
    </div>
    <div class="hero-image-root">
      <div class="profile-glow-ring">
        <img id="profile-img" src="/uploads/profile.jpg" alt="Profile">
      </div>
      <div class="upload-box">
        <input type="file" id="photoInput" accept="image/*" style="display: none;">
        <button class="btn-upload" onclick="document.getElementById('photoInput').click()">Choose File</button>
        <button class="btn-upload" onclick="uploadPhoto()">Save Photo</button>
      </div>
    </div>
  </main>
  <script>
    async function uploadPhoto() {
        const file = document.getElementById('photoInput').files[0];
        if (!file) return alert("Select a file first!");
        const formData = new FormData();
        formData.append('photo', file);
        const res = await fetch('/api/upload-photo', { method: 'POST', body: formData });
        if(res.ok) { alert("Photo Updated!"); window.location.reload(); }
    }
  </script>
</body>
</html>
