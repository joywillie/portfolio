<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "/signin";
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyTech Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* MASTER LAYOUT STYLING RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* NAVIGATION HEADER STYLING ARCHITECTURE */
    header {
      background: #0f172a;
      padding: 20px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    .logo a {
      color: #38bdf8;
      font-size: 26px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    nav a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* HERO CONTAINER ARCHITECTURE */
    .hero-container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 50px;
      flex-grow: 1;
    }

    .hero-text {
      flex: 1;
      max-width: 600px;
    }

    .hero-text h3 {
      color: #38bdf8;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .hero-text h1 {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 15px;
    }

    .hero-text h2 {
      font-size: 24px;
      color: #cbd5e1;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .hero-text p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    /* ACTION CALL BUTTON MODULES */
    .cta-group {
      display: flex;
      gap: 20px;
    }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .btn-primary:hover {
      background: #0ea5e9;
    }

    .btn-secondary {
      background: transparent;
      color: #38bdf8;
      border: 2px solid #38bdf8;
      padding: 10px 26px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(56, 189, 248, 0.1);
    }

    /* AVATAR GLOW RING CONTAINER */
    .hero-image-root {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-glow-ring {
      width: 350px;
      height: 350px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-glow-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* MOBILE RESPONSIVE MEDIA BREAKPOINTS */
    @media (max-width: 968px) {
      header { padding: 20px 40px; }
      .hero-container {
        flex-direction: column-reverse;
        text-align: center;
        padding: 40px 40px;
      }
      .cta-group { justify-content: center; }
      .profile-glow-ring { width: 280px; height: 280px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="/">JoyTech</a>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/skills">Skills</a>
      <a href="/projects">Projects</a>
      <a href="/contact">Contact</a>
      
      <div id="dynamic-auth-root" style="display: inline-block;"></div>
    </nav>
  </header>

  <main class="hero-container">
    
    <div class="hero-text">
      <h3>Hello, I'm</h3>
      <h1>Joyce William</h1>
      <h2>ICT Technician & Web Developer</h2>
      <p>Passionate about web development, UI design, mobile applications, and building modern digital experiences.</p>
      
      <div class="cta-group">
        <a href="/projects" class="btn-primary">View Projects</a>
        <a href="/contact" class="btn-secondary">Contact Me</a>
      </div>
    </div>

    <div class="hero-image-root">
      <div class="profile-glow-ring">
        <img src="profile.jpg" alt="Joyce William Profile Photo" onerror="this.src='https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=600'">
      </div>
    </div>

  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const authRoot = document.getElementById("dynamic-auth-root");
      const sessionToken = localStorage.getItem("token");

      if (sessionToken) {
        // Authenticated Session -> Mount the Red Log Out Interface Option
        authRoot.innerHTML = `
          <a href="#" id="logout-trigger-btn" style="background: #ef4444; color: white; padding: 8px 18px; border-radius: 6px; font-weight: 600; text-decoration: none; transition: 0.3s; font-size: 15px;">Sign Out</a>
        `;
        
        document.getElementById("logout-trigger-btn").addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem("token");
          alert("👋 Signed out safely!");
          window.location.href = "/signin";
        });
      } else {
        // Fallback Anchor Element (Handled implicitly by head script guard redirect)
        authRoot.innerHTML = `
          <a href="/signin" style="background: #38bdf8; color: #0f172a; padding: 8px 18px; border-radius: 6px; font-weight: 600; text-decoration: none; transition: 0.3s; font-size: 15px;">Sign In</a>
        `;
      }
    });
  </script>

</body>
</html>
